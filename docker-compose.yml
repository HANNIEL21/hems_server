version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: hems-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hems_db
      MYSQL_USER: hems_user
      MYSQL_PASSWORD: hems_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: